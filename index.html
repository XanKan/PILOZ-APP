<style>
:root{
  --encre:#3B1670; --encre-2:#2A0F52; --flamme:#A450FB; --flamme-2:#8A34E4;
  --papier:#F7F5FB; --carte:#FFFFFF; --carte2:#FAF8FD; --carbone:#1E1826; --gris:#6F6884; --trait:#E6E1F0;
  --sapin:#1E7A46; --sapin-p:#E4F3E9; --brique:#B3261E; --brique-p:#FBEAE8;
  --ambre:#B45D0C; --ambre-p:#FDF0DF; --bleu-p:#F1E9FD;
  --champ:#FFFFFF; --accent-clair:#FFD9C9;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Albert Sans',sans-serif;background:var(--papier);color:var(--carbone);min-height:100vh}
.mono{font-family:'Spline Sans Mono',monospace}
h1,h2,.disp{font-family:'Archivo Black',sans-serif;letter-spacing:.01em}

/* ---------- Coque : rail intercalaires + contenu ---------- */
.app{display:flex;min-height:100vh}
.rail{width:236px;background:var(--encre);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;transition:width .2s}
.app.mini .rail{width:66px}
.app.mini .brand div,.app.mini .tab .lbl,.app.mini .tab .badge,.app.mini .rail-foot{display:none}
.app.mini .brand{padding:16px 12px;justify-content:center}
.app.mini .tab{justify-content:center;padding:13px 0}
.plier{background:none;border:none;color:#D9C6F5;cursor:pointer;font:600 .8rem 'Albert Sans';padding:10px 16px;text-align:left;display:flex;align-items:center;gap:10px}
.plier:hover{color:#fff}
.app.mini .plier{justify-content:center;padding:10px 0}
.brand{padding:22px 18px 16px}
.brand .disp{font-size:1.15rem;line-height:1.1}
.brand small{display:block;color:#C9A9F0;font-weight:500;margin-top:4px;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase}
.tabs{display:flex;flex-direction:column;gap:2px;margin-top:8px}
.rail{justify-content:flex-start}
.tab{display:flex;align-items:center;gap:10px;padding:12px 16px;color:#D9C6F5;background:none;border:none;font:600 .92rem 'Albert Sans';cursor:pointer;text-align:left;border-left:5px solid transparent;transition:background .15s}
.tab:hover{background:rgba(255,255,255,.07)}
.tab.on{background:var(--papier);color:var(--encre);border-left-color:var(--flamme);border-radius:0 var(--r) var(--r) 0;margin-right:-1px}
.tab .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tab .badge{margin-left:auto;background:var(--flamme);color:#fff;border-radius:99px;font-size:.7rem;padding:1px 7px;font-weight:700}
.rail-foot{padding:14px 16px;font-size:.7rem;color:#BFA1EA}
.main{flex:1;min-width:0;padding:26px 30px 60px}

/* ---------- Barre haute ---------- */
.topbar{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.topbar h1{font-size:1.5rem;color:var(--encre)}
.topbar .date{color:var(--gris);font-weight:500}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:10px 16px;font:700 .88rem 'Albert Sans';cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .12s, box-shadow .12s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--flamme);color:#fff;box-shadow:0 3px 0 var(--flamme-2)}
.btn-p:hover{box-shadow:0 4px 0 var(--flamme-2);transform:translateY(-1px)}
.btn-o{background:var(--carte);color:var(--carbone);border:1.5px solid var(--trait)}
.btn-o:hover{border-color:var(--encre)}
.btn-ghost{background:none;color:var(--gris);padding:8px 10px}
.btn-ghost:hover{color:var(--encre)}

/* ---------- KPI ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--carte);border:1px solid var(--trait);border-radius:var(--r);padding:14px 16px}
.kpi label{font-size:.72rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--gris)}
.kpi .v{font-family:'Spline Sans Mono';font-weight:700;font-size:1.7rem;color:var(--encre);margin-top:4px;line-height:1.1}
.kpi .v.orange{color:var(--flamme)} .kpi .v.vert{color:var(--sapin)} .kpi .v.rouge{color:var(--brique)}
.kpi small{color:var(--gris);font-size:.75rem}

/* ---------- Filtres 1-clic ---------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.chip{border:1.5px solid var(--trait);background:var(--carte);color:var(--carbone);border-radius:99px;padding:8px 15px;font:600 .85rem 'Albert Sans';cursor:pointer;display:inline-flex;gap:7px;align-items:center}
.chip .n{font-family:'Spline Sans Mono';font-weight:700;font-size:.78rem;color:var(--gris)}
.chip.on{border-color:var(--encre);background:var(--encre);color:#fff}
.chip.on .n{color:#E9D5FF}
.chip.c-enc.on{background:var(--flamme);border-color:var(--flamme)}
.chip.c-sig.on{background:var(--sapin);border-color:var(--sapin)}
.chip.c-per.on{background:var(--brique);border-color:var(--brique)}
.search{margin-left:auto;border:1.5px solid var(--trait);border-radius:10px;padding:9px 13px;font:500 .9rem 'Albert Sans';min-width:200px;background:var(--champ);color:var(--carbone)}
.search:focus{outline:2px solid var(--encre);outline-offset:1px}

/* ---------- Lignes-dossiers ---------- */
.rows{display:flex;flex-direction:column;gap:9px}
.row{background:var(--carte);border:1px solid var(--trait);border-left:6px solid var(--gris);border-radius:var(--r);padding:13px 16px;display:grid;grid-template-columns:minmax(160px,1.4fr) minmax(130px,1.1fr) 110px 120px auto;gap:6px 16px;align-items:center}
.row.enc{border-left-color:var(--flamme)} .row.sig{border-left-color:var(--sapin);background:linear-gradient(0deg,var(--sapin-p),var(--sapin-p)) , var(--carte)}
.row.per{border-left-color:var(--brique);background:var(--brique-p)}
.row .who b{font-size:1rem}
.row .who span{display:block;color:var(--gris);font-size:.8rem}
.row .prod{font-size:.88rem}
.row .prod small{display:block;color:var(--gris)}
.row .amt{font-family:'Spline Sans Mono';font-weight:700;font-size:.95rem}
.row .amt small{display:block;color:var(--gris);font-weight:500;font-size:.72rem;font-family:'Albert Sans'}
.st{display:inline-block;border-radius:7px;padding:4px 10px;font-size:.76rem;font-weight:700}
.st-enc{background:var(--bleu-p);color:var(--encre)} .st-env{background:var(--ambre-p);color:var(--ambre)}
.st-sig{background:var(--sapin-p);color:var(--sapin)} .st-per{background:var(--brique-p);color:var(--brique)}
.rowbtns{display:flex;gap:5px;justify-self:end;flex-wrap:wrap}
.ic{border:1.5px solid var(--trait);background:var(--carte);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:.95rem;display:grid;place-items:center}
.ic:hover{border-color:var(--encre)}
.ic.v:hover{border-color:var(--sapin);background:var(--sapin-p)}
.ic.x:hover{border-color:var(--brique);background:var(--brique-p)}
.alerte{grid-column:1/-1;font-size:.8rem;font-weight:600;padding-top:2px}
.alerte.feu{color:var(--brique)} .alerte.ok{color:var(--sapin)} .alerte.plan{color:var(--ambre)}
.raison-tag{font-size:.78rem;color:var(--brique);font-weight:600}
.vide{background:var(--carte);border:1.5px dashed var(--trait);border-radius:var(--r);padding:40px;text-align:center;color:var(--gris)}
.vide b{color:var(--carbone)}

/* ---------- Tickets À faire ---------- */
.tickets{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.ticket{background:var(--carte);border:1px solid var(--trait);border-top:6px solid var(--flamme);border-radius:var(--r);padding:16px;position:relative}
.ticket.retard{border-top-color:var(--brique)}
.ticket .quand{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.ticket.retard .quand{color:var(--brique)} .ticket:not(.retard) .quand{color:var(--flamme)}
.ticket h3{font-size:1.05rem;margin:5px 0 2px}
.ticket .tel{font-family:'Spline Sans Mono';font-size:.85rem;color:var(--encre)}
.ticket p{color:var(--gris);font-size:.85rem;margin:6px 0 12px}
.ticket .tbtns{display:flex;gap:7px;flex-wrap:wrap}

/* ---------- Tableaux (mensuel, pilotage, objectifs) ---------- */
.card{background:var(--carte);border:1px solid var(--trait);border-radius:var(--r);padding:18px;margin-bottom:18px}
.card h2{font-size:.95rem;color:var(--encre);margin-bottom:12px;letter-spacing:.03em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:var(--encre);color:#fff;font-weight:700;padding:9px 10px;text-align:left;font-size:.78rem;letter-spacing:.04em}
th:first-child{border-radius:8px 0 0 8px} th:last-child{border-radius:0 8px 8px 0}
td{padding:9px 10px;border-bottom:1px solid var(--trait)}
tr:nth-child(even) td{background:var(--carte2)}
td.num{font-family:'Spline Sans Mono';font-weight:700;text-align:right}
tr.total td{background:var(--flamme);color:#fff;font-weight:700;border:none}
tr.total td.num{color:#fff}
.bar{height:9px;background:var(--trait);border-radius:99px;overflow:hidden;min-width:80px}
.bar i{display:block;height:100%;border-radius:99px;background:var(--sapin)}
.bar.low i{background:var(--brique)} .bar.mid i{background:var(--ambre)}
input.cell{width:80px;border:1.5px solid var(--trait);border-radius:8px;padding:6px 8px;font:600 .85rem 'Spline Sans Mono';text-align:right;background:var(--champ);color:var(--carbone)}
input.cell:focus{outline:2px solid var(--encre)}
select.annee{border:1.5px solid var(--trait);border-radius:10px;padding:8px 12px;font:700 .9rem 'Albert Sans';background:var(--champ);color:var(--carbone)}
canvas{max-height:260px}

const enCours = d => STATUTS_ENCOURS.includes(d.statut);
const joursDepuis = s => s ? Math.floor((AUJ() - new Date(s+'T00:00'))/86400000) : null;
function derniereAction(d){ return [d.dateContact,d.dateDevis,d.derniereRelance].filter(Boolean).sort().pop(); }
function alerte(d){
  if(!enCours(d)) return null;
  if(d.prochaineRelance){
    const j = joursDepuis(d.prochaineRelance);
    if(j>0) return {t:'feu', txt:`🔥 Relance en retard de ${j} j (prévue le ${fmtD(d.prochaineRelance)})`};
    if(j===0) return {t:'feu', txt:'🔥 À relancer aujourd\u2019hui'};
    return {t:'ok', txt:`⏳ Relance prévue le ${fmtD(d.prochaineRelance)}`};
  }
  const j = joursDepuis(derniereAction(d));
  if(j>7) return {t:'plan', txt:`📝 ${j} j sans action — planifiez une relance`};
  return {t:'ok', txt:'🟢 Suivi à jour'};
}
const aFaire = () => S.deals.filter(d => enCours(d) && d.prochaineRelance && joursDepuis(d.prochaineRelance)>=0);
const kSum = (arr,f) => arr.reduce((a,d)=>a+(+f(d)||0),0);
function statsGlobales(){
  const enc = S.deals.filter(enCours), sig = S.deals.filter(d=>d.statut==='Signé'), per = S.deals.filter(d=>d.statut==='Perdu');
  return {
    enc, sig, per,
    pipelineM: kSum(enc,d=>d.mensuel), pipelineU: kSum(enc,d=>d.unique),
    mrr: kSum(sig,d=>d.mensuel), caU: kSum(sig,d=>d.unique),
    ca1an: kSum(sig,d=>d.mensuel)*12 + kSum(sig,d=>d.unique),
    conv: (sig.length+per.length) ? sig.length/(sig.length+per.length) : 0,
    forecast: STATUTS_ENCOURS.reduce((a,st)=>a + kSum(S.deals.filter(d=>d.statut===st),d=>d.mensuel)*(S.params.probas[st]||0)/100, 0)
  };
}
function statsMois(annee){
  return Array.from({length:12},(_,m)=>{
    const dansMois = s => s && new Date(s+'T00:00').getFullYear()===annee && new Date(s+'T00:00').getMonth()===m;
    const contacts = S.deals.filter(d=>dansMois(d.dateContact)).length;
    const devis = S.deals.filter(d=>dansMois(d.dateDevis)).length;
    const sig = S.deals.filter(d=>d.statut==='Signé' && dansMois(d.dateDevis));
    const mrr = kSum(sig,d=>d.mensuel), un = kSum(sig,d=>d.unique);
    return {contacts, devis, signes:sig.length, mrr, unique:un, ca:mrr*12+un};
  });
}

      {method:'POST', headers:{'Authorization':'Bearer '+SES.access_token, 'apikey':CFG.key, 'x-upsert':'true', 'Content-Type': f.type || 'application/octet-stream'}, body: f});
    if(!r.ok){
      let msg=''; try{ const j=await r.json(); msg=j.message||j.error||''; }catch(e){}
      toast(/bucket/i.test(msg) || r.status===404
        ? 'Espace fichiers non installé — suivez le guide GUIDE-PIECES-JOINTES (2 min, une fois)'

    }

async function ouvrirFichier(dealId, i){
  const f = getD(dealId).fichiers[i];
  toast('Ouverture de « '+f.nom+' »…');
  try{
    const r = await fetch(CFG.url.replace(/\/$/,'') + '/storage/v1/object/fichiers/' + f.chemin,
      {headers:{'Authorization':'Bearer '+SES.access_token, 'apikey':CFG.key}});
    if(!r.ok){ toast('Fichier introuvable ('+r.status+')'); return; }
    const blob = await r.blob();
    window.open(URL.createObjectURL(blob), '_blank');
  }catch(e){ toast('Ouverture impossible'); }
}
async function supprimerFichier(dealId, i){
  const d = getD(dealId), f = d.fichiers[i];
  try{
    await fetch(CFG.url.replace(/\/$/,'') + '/storage/v1/object/fichiers/' + f.chemin,
      {method:'DELETE', headers:{'Authorization':'Bearer '+SES.access_token, 'apikey':CFG.key}});
  }catch(e){}
  d.fichiers.splice(i,1);
  journal(d, '📎 Pièce jointe supprimée : '+f.nom);
  sauver('Fichier supprimé'); render();
}

function appliquerRelance(id, code){
  const d = getD(id);
  const R = S.params.relance;
  const libs = {repondeur:'répondeur', discussion:'discussion en cours', positif:'très positif', date:'rendez-vous fixé'};
  let prochaine;
  if(code==='date'){ const el=document.getElementById('rel_date'); prochaine = (el&&el.value) || plusJours(iso(AUJ()),R.standard); }
  else prochaine = plusJours(iso(AUJ()), R[code]||R.standard);

  d.derniereRelance = iso(AUJ());
  d.prochaineRelance = prochaine;
  if(d.statut==='Prospection'||d.statut==='Devis envoyé') d.statut='Relance';
  journal(d, 'Relance n°'+d.nbRelances+' — '+(libs[code]||code)+' → prochaine le '+fmtD(prochaine));
  sauver('Relance notée — prochaine le '+fmtD(prochaine));
  fermer(); render();
}

/* ---------- PIPELINE KANBAN ---------- */
const KCOUL = {'Prospection':'#7C90D8','Devis envoyé':'#E0A050','Relance':'#A450FB','En attente':'#9AA3B8','Signé':'#1E7A46','Perdu':'#B3261E'};
function vueKanban(){
  let base = S.deals;
  if(recherche){ const q=recherche.toLowerCase(); base=base.filter(d=>[d.client,d.contact,d.produit,d.commentaires].join(' ').toLowerCase().includes(q)); }
  return `<div class="kanban">` + TOUS_STATUTS.map(st=>{
    const cards = base.filter(d=>d.statut===st);
    const tot = kSum(cards, d=>d.mensuel);
    return `<div class="kcol" style="--kc:${KCOUL[st]}"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="this.classList.remove('dragover');deposerCarte(event,'${st}')">
      <div class="khead"><b>${st.toUpperCase()}</b><small>${cards.length} · ${eur(tot)}/m</small></div>
      ${cards.length ? cards.map(d=>{
        const a = alerte(d);
        return `<div class="kcard" draggable="true" ondragstart="event.dataTransfer.setData('text/plain','${d.id}')" onclick="ficheDossier(${d.id})">
          <b>${esc(d.client)}</b>
          <small>${esc(d.produit||'—')}</small>
          <div class="m">${eur(d.mensuel)}/m${d.unique?' + '+eur(d.unique):''}</div>
          ${a&&a.t==='feu'?`<div class="feu">🔥 à relancer</div>`:''}
          
        </div>`;}).join('') : `<div class="kvide">Glissez un dossier ici</div>`}
    </div>`;
  }).join('') + `</div>
  <p style="color:var(--gris);font-size:.8rem;margin-top:8px">💡 Glissez-déposez les cartes d'une colonne à l'autre pour changer leur statut — comme sur HubSpot. Un clic ouvre la fiche.</p>`;
}
function deposerCarte(ev, st){
  const id = +ev.dataTransfer.getData('text/plain');
  const d = getD(id);
  if(!d || d.statut===st) return;
  if(st==='Perdu'){ perdre(id); return; }
  if(st==='Signé'){ signer(id); return; }
  d.statut = st; d.raisonPerte='';
  journal(d, 'Statut → '+st+' (pipeline)');
  sauver(d.client+' → '+st); render();
}

/* ================= VUE : MA SEMAINE (rapport d'activité) ================= */
let semOffset = 0;
function bornesSemaine(offset){
  const d = AUJ(); const jour = (d.getDay()+6)%7; // lundi=0
  const lundi = new Date(d); lundi.setDate(d.getDate()-jour+offset*7);
  const dim = new Date(lundi); dim.setDate(lundi.getDate()+6);
  return [iso(lundi), iso(dim)];
}
function evtsSemaine(deb, fin){
  return S.deals.flatMap(d=>(d.journal||[]).map(e=>({...e, client:d.client, did:d.id})))
    .filter(e=>e.d>=deb && e.d<=fin)
    .sort((a,b)=>((a.d||'')+(a.h||'')).localeCompare((b.d||'')+(b.h||'')));
}
function statsSemaine(deb, fin){
  const ev = evtsSemaine(deb, fin);
  const cpt = re => ev.filter(e=>re.test(e.t)).length;
  return {
    ev,
    relances: cpt(/^Relance n°/),
    emails: cpt(/^Email «/),
    crees: cpt(/^Dossier créé/),
    signes: cpt(/SIGNÉ/),
    perdus: cpt(/PERDU/),
    notes: cpt(/^📝/),
    planifs: cpt(/^Relance planifiée/),
    total: ev.length
  };
}
function deltaTxt(a, b){
  const d = a-b;
  if(d>0) return `<small style="color:var(--sapin);font-weight:700">▲ +${d}</small>`;
  if(d<0) return `<small style="color:var(--brique);font-weight:700">▼ ${d}</small>`;
  return `<small style="color:var(--gris)">= stable</small>`;
}
function vSemaine(){
  charts.forEach(c=>c.destroy()); charts=[];
  const [deb, fin] = bornesSemaine(semOffset);
  const [pdeb, pfin] = bornesSemaine(semOffset-1);
  const s = statsSemaine(deb, fin), p = statsSemaine(pdeb, pfin);
  const sigSem = S.deals.filter(d=>d.statut==='Signé' && (d.journal||[]).some(e=>/SIGNÉ/.test(e.t) && e.d>=deb && e.d<=fin));
  const caSem = kSum(sigSem,d=>d.mensuel)*12 + kSum(sigSem,d=>d.unique);
  const jours = {}; s.ev.forEach(e=>{ (jours[e.d]=jours[e.d]||[]).push(e); });
  document.getElementById('main').innerHTML = `
  <div class="topbar"><div><h1>Ma semaine</h1><div class="date">du ${fmtD(deb)} au ${fmtD(fin)}${semOffset===0?' (semaine en cours)':''}</div></div>
  <div class="actions">
    <button class="btn btn-o" onclick="semOffset--;render()">‹ Précédente</button>
    ${semOffset<0?`<button class="btn btn-o" onclick="semOffset++;render()">Suivante ›</button>`:''}
    ${semOffset!==0?`<button class="btn btn-ghost" onclick="semOffset=0;render()">Aujourd'hui</button>`:''}
    <button class="btn btn-p" onclick="window.print()">🖨 Export PDF du rapport</button></div></div>
  <div class="card"><h2>CE QUE J'AI FAIT CETTE SEMAINE (vs semaine précédente)</h2>
    <div class="kpis" style="margin:0">
      <div class="kpi"><label>Relances effectuées</label><div class="v orange">${s.relances}</div>${deltaTxt(s.relances,p.relances)}</div>
      <div class="kpi"><label>Emails envoyés</label><div class="v">${s.emails}</div>${deltaTxt(s.emails,p.emails)}</div>
      <div class="kpi"><label>Dossiers créés</label><div class="v">${s.crees}</div>${deltaTxt(s.crees,p.crees)}</div>
      <div class="kpi"><label>Deals signés</label><div class="v vert">${s.signes}</div>${deltaTxt(s.signes,p.signes)}</div>
      <div class="kpi"><label>CA 1ère année signé</label><div class="v vert">${eur(caSem)}</div></div>
      <div class="kpi"><label>Perdus</label><div class="v rouge">${s.perdus}</div></div>
      <div class="kpi"><label>Notes & planifs</label><div class="v">${s.notes+s.planifs}</div></div>
      <div class="kpi"><label>Actions totales</label><div class="v">${s.total}</div>${deltaTxt(s.total,p.total)}</div>
    </div></div>
  <div class="card"><h2>LE DÉTAIL, JOUR PAR JOUR — votre justificatif d'activité</h2>
    ${Object.keys(jours).length ? Object.keys(jours).sort().map(j=>`
      <div style="margin-bottom:10px">
        <div style="font-weight:700;color:var(--encre);text-transform:capitalize;border-bottom:2px solid var(--trait);padding-bottom:3px;margin-bottom:4px">${new Date(j+'T00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div>
        ${jours[j].map(e=>`<div style="font-size:.86rem;padding:3px 0"><span class="mono" style="color:var(--gris)">${e.h||'—'}</span> · <b style="cursor:pointer" onclick="ficheDossier(${e.did})">${esc(e.client)}</b> — ${esc(e.t)}</div>`).join('')}
      </div>`).join('')
    : '<p style="color:var(--gris)">Aucune action enregistrée sur cette semaine.</p>'}
  </div>`;
}

function ligneHtml(l, i){

    <td><input class="cell" style="width:100%;text-align:left" value="${esc(l.designation||'')}" onchange="majLigne(${i},'designation',this.value)"></td>
    <td><input class="cell" type="number" step="any" style="width:70px" value="${l.qte??1}" onchange="majLigne(${i},'qte',this.value)"></td>
    <td><input class="cell" type="number" step="any" style="width:95px" value="${l.pu??0}" onchange="majLigne(${i},'pu',this.value)"></td>
    <td><input class="cell" type="number" step="any" style="width:65px" value="${l.tva??S.factu.tvaDefaut}" onchange="majLigne(${i},'tva',this.value)"></td>
    <td class="mono" style="text-align:right">${eur(Math.round((+l.qte||0)*(+l.pu||0)))}</td>
    <td><button class="ic x" style="width:26px;height:26px" onclick="retirerLigne(${i})">✕</button></td></tr>`;
}
let docEnCours = null;
function majLigne(i,k,v){ docEnCours.lignes[i][k] = k==='designation'?v:+v; majTotauxForm(); }
function retirerLigne(i){ docEnCours.lignes.splice(i,1); redessinerLignes(); }
function ajouterLigne(){ docEnCours.lignes.push({designation:'', qte:1, pu:0, tva:S.factu.tvaDefaut}); redessinerLignes(); }
function redessinerLignes(){
  const tb = document.getElementById('doc_lignes');
  if(tb) tb.innerHTML = docEnCours.lignes.map((l,i)=>ligneHtml(l,i)).join('');
  majTotauxForm();
}
function majTotauxForm(){
  const t = totauxDoc(docEnCours);
  const el = document.getElementById('doc_tot');
  if(el) el.innerHTML = `HT <b class="mono">${eur(Math.round(t.ht*100)/100)}</b> · TVA <b class="mono">${eur(Math.round(t.tva*100)/100)}</b> · TTC <b class="mono" style="color:var(--flamme)">${eur(Math.round(t.ttc*100)/100)}</b>`;
}
function formDoc(id, type){
  const doc = id ? S.factu.docs.find(x=>x.id===id) : null;
  type = doc ? doc.type : type;
  docEnCours = doc ? structuredClone(doc) : {type, client:'', date:iso(AUJ()), echeance:plusJours(iso(AUJ()), type==='F'?30:30), lignes:[{designation:'', qte:1, pu:0, tva:S.factu.tvaDefaut}], notes:''};

function voirDoc(id){
  const x = S.factu.docs.find(d=>d.id===id);
  const t = totauxDoc(x);
  const stD = ['brouillon','envoyé','accepté','refusé'], stF = ['brouillon','envoyée','payée'];
  formModal(`${x.type==='D'?'Devis':'Facture'} ${esc(x.numero)} — ${esc(x.client)}`, `
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px">
      ${(x.type==='D'?stD:stF).map(st=>`<button class="chip ${x.statut===st?(st==='payée'||st==='accepté'?'c-sig on':st==='refusé'?'c-per on':'c-enc on'):''}" onclick="statutDoc(${x.id},'${st}')">${st}</button>`).join('')}
    </div>
    <p style="font-size:.9rem">Émis le <b>${fmtD(x.date)}</b> · ${x.type==='D'?'valable jusqu\u2019au':'à régler avant le'} <b>${fmtD(x.echeance)}</b></p>
    <p style="font-size:1.05rem;margin:8px 0">Total : <b class="mono">${eur(Math.round(t.ht*100)/100)} HT</b> · TVA ${eur(Math.round(t.tva*100)/100)} · <b class="mono" style="color:var(--flamme)">${eur(Math.round(t.ttc*100)/100)} TTC</b></p>
    ${x.ref?`<p style="font-size:.82rem;color:var(--gris)">Issu du devis ${esc(x.ref)}</p>`:''}
    <div class="actions" style="margin-top:14px">
      <button class="btn btn-p" onclick="imprimerDoc(${x.id})">🖨 Imprimer / PDF</button>
      <button class="btn btn-o" onclick="fermer();formDoc(${x.id})">✏️ Modifier</button>
      ${x.type==='D'&&x.statut!=='refusé'?`<button class="btn btn-o" onclick="devisVersFacture(${x.id})">→ Transformer en facture</button>`:''}
      ${x.type==='F'&&x.statut!=='payée'?`<button class="btn btn-o" onclick="statutDoc(${x.id},'payée')">✓ Marquer payée</button>`:''}
    </div>`, ()=>{}, 'Fermer');
}
function statutDoc(id, st){
  const x = S.factu.docs.find(d=>d.id===id);
  x.statut = st;
  if(st==='payée') x.datePaiement = iso(AUJ());
  sauver(x.numero+' → '+st); render(); voirDoc(id);
}
function devisVersFacture(id){
  const d = S.factu.docs.find(x=>x.id===id);
  const f = structuredClone(d);
  f.id = (S.factu.docs.reduce((m,x)=>Math.max(m,x.id||0),0))+1;
  f.type = 'F'; f.numero = numDoc('F'); f.statut = 'brouillon';
  f.date = iso(AUJ()); f.echeance = plusJours(iso(AUJ()),30);
  f.ref = d.numero; delete f.datePaiement;
  S.factu.next.F++; S.factu.docs.push(f);
  d.statut = 'accepté';
  sauver('Facture '+f.numero+' créée depuis le devis '+d.numero);
  fermer(); render(); voirDoc(f.id);
}

    ()=>{ S.factu.docs = S.factu.docs.filter(d=>d.id!==id); sauver(x.numero+' supprimé'); });
}

function exportCompta(){
  const fa = S.factu.docs.filter(x=>x.type==='F' && x.statut!=='brouillon');
  if(!fa.length){ toast('Aucune facture à exporter (les brouillons sont exclus)'); return; }
  const C = S.factu.comptes;
  const lignes = [['Date','Journal','Compte','Libellé','Débit','Crédit','Pièce']];
  fa.forEach(x=>{
    const t = totauxDoc(x);
    const lib = (x.type==='F'?'Facture ':'')+x.numero+' '+x.client;
    lignes.push([x.date,'VE',C.client,lib,t.ttc.toFixed(2),'',x.numero]);
    lignes.push([x.date,'VE',C.vente,lib,'',t.ht.toFixed(2),x.numero]);
    if(t.tva>0.004) lignes.push([x.date,'VE',C.tva,lib,'',t.tva.toFixed(2),x.numero]);
  });
  const csv = lignes.map(l=>l.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(';')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'export-comptable-'+iso(AUJ())+'.csv'; a.click();
  toast('Export comptable téléchargé ('+fa.length+' facture(s))');
}

function exporterCSV(){
  const cols = ['Client','Contact','Coordonnées','Origine','Produit','Mensuel (€)','Unique (€)','Statut','1er contact','Date devis','Dernière relance','Nb relances','Prochaine relance','Raison de perte','Commentaires'];
  const li = S.deals.map(d=>[d.client,d.contact,d.coord,d.origine,d.produit,d.mensuel||0,d.unique||0,d.statut,d.dateContact,d.dateDevis,d.derniereRelance,d.nbRelances||0,d.prochaineRelance,d.raisonPerte,d.commentaires]
    .map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(';'));
  const blob = new Blob(['\ufeff'+cols.join(';')+'\n'+li.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'suivi-commercial-'+iso(AUJ())+'.csv'; a.click();
  toast('Export CSV téléchargé');
}
function exporterJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`piloz-${iso(AUJ())}.json`; a.click();
  toast('Données exportées');
}
function importerJSON(inp){
  const f=inp.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ S=JSON.parse(r.result); sauver('Données importées'); render(); }catch(e){ toast('Fichier invalide'); } };
  r.readAsText(f);
}

}

let editAccueil = false;
let sugIdx = -1;
function suggererClients(q){
  const box = document.getElementById('sug_clients');
  if(!box) return;
  sugIdx = -1;
  q = (q||'').trim().toLowerCase();
  let list = S.clients;
  if(q) list = list.filter(c => (c.nom+' '+(c.contact||'')+' '+(c.email||'')).toLowerCase().includes(q));
  list = list.slice(0,6);
  const exact = q && S.clients.some(c=>c.nom.toLowerCase()===q);
  if(!list.length && !q){ box.style.display='none'; return; }
  box.innerHTML = list.map(c=>`<button type="button" onclick="choisirClient(${c.id})"><b>${surligner(c.nom,q)}</b><small>${esc([c.contact,c.email,c.tel].filter(Boolean).join(' · ')||'—')}</small></button>`).join('')
    + (q && !exact ? `<button type="button" class="new" onclick="fermerSug()">＋ Créer le nouveau client « ${esc(q)} »</button>` : '');
  box.style.display = box.innerHTML ? 'block' : 'none';
}
function surligner(txt,q){
  if(!q) return esc(txt);
  const i = txt.toLowerCase().indexOf(q);
  if(i<0) return esc(txt);
  return esc(txt.slice(0,i)) + '<mark style="background:var(--ambre-p);border-radius:3px">' + esc(txt.slice(i,i+q.length)) + '</mark>' + esc(txt.slice(i+q.length));
}
function choisirClient(id){
  const c = S.clients.find(x=>x.id===id);
  const set=(i,v)=>{const e=document.getElementById(i); if(e) e.value=v;};
  set('f_client', c.nom);
  const cont=document.getElementById('f_contact'), coord=document.getElementById('f_coord');
  if(cont && !cont.value) cont.value = c.contact||'';
  if(coord && !coord.value) coord.value = [c.email,c.tel].filter(Boolean).join(' · ');
  fermerSug();
}

/* ---------- Doublons clients : détection & fusion ---------- */
function detecterDoublons(){
  const groupes = [];
  const vus = new Set();
  S.clients.forEach(a=>{
    if(vus.has(a.id)) return;
    const g = [a];
    S.clients.forEach(b=>{
      if(b.id===a.id || vus.has(b.id)) return;
      const na = normNom(a.nom), nb = normNom(b.nom);
      const memeNom = na && nb && (na===nb || (na.length>=4 && nb.includes(na)) || (nb.length>=4 && na.includes(nb)));
      const memeEmail = a.email && b.email && a.email.toLowerCase()===b.email.toLowerCase();
      if(memeNom || memeEmail) g.push(b);
    });
    if(g.length>1){ g.forEach(c=>vus.add(c.id)); groupes.push(g); }
  });
  return groupes;
}
function ecranDoublons(){
  const groupes = detecterDoublons();
  formModal('🧬 Doublons clients', groupes.length ? `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:10px">${groupes.length} groupe(s) de fiches qui semblent désigner le même client. La fusion garde la fiche la plus complète, réattache tous les devis, et supprime les autres fiches. Rien n'est perdu.</p>
    ${groupes.map((g,gi)=>`<div class="plist" style="margin-bottom:12px">
      ${g.map(c=>{const s=statsClient(c);return `<div class="pitem"><span><b>${esc(c.nom)}</b><br><small style="color:var(--gris)">${esc([c.contact,c.email,c.tel].filter(Boolean).join(' · ')||'—')} · ${s.nb} devis</small></span></div>`;}).join('')}
      <div class="actions"><button class="btn btn-p" style="padding:7px 12px" onclick="fusionnerGroupe(${gi})">🧬 Fusionner ces ${g.length} fiches</button></div>
    </div>`).join('')}` : '<p style="color:var(--gris)">Aucun doublon détecté — votre fichier clients est propre. 👍</p>',
    ()=>{}, 'Fermer');
  window._groupesDoublons = groupes;
}
function fusionnerGroupe(gi){
  const g = window._groupesDoublons[gi];
  if(!g) return;
  // fiche gardée = la plus complète (le plus de champs remplis, puis le plus de devis)
  const score = c => ['contact','email','tel','notes'].filter(k=>c[k]).length*10 + statsClient(c).nb;
  const garde = [...g].sort((a,b)=>score(b)-score(a))[0];
  g.forEach(c=>{
    if(c.id===garde.id) return;
    ['contact','email','tel','notes'].forEach(k=>{ if(!garde[k] && c[k]) garde[k]=c[k]; });
    S.deals.forEach(d=>{ if(d.clientId===c.id || d.client===c.nom){ d.clientId=garde.id; d.client=garde.nom; } });
    S.clients = S.clients.filter(x=>x.id!==c.id);
  });
  // on rattache aussi formellement les devis de la fiche conservée (anciennes lignes sans identifiant)
  S.deals.forEach(d=>{ if(d.client===garde.nom) d.clientId = garde.id; });
  sauver('Fiches fusionnées sous « '+garde.nom+' »');
  ecranDoublons(); render();
}
function importerClients(inp){
  const f=inp.files[0]; if(!f) return;
  const lire = rows => { inp.value=''; mapperColonnes(rows.filter(r=>r && r.some(x=>String(x||'').trim()))); };
  if(/\.csv$/i.test(f.name)){
    const r=new FileReader();
    r.onload=()=>lire(r.result.split(/\r?\n/).map(l=>l.split(/[;,\t]/)));
    r.readAsText(f);
  } else {
    const r=new FileReader();
    r.onload=()=>{ try{
      const wbk=XLSX.read(new Uint8Array(r.result),{type:'array'});
      lire(XLSX.utils.sheet_to_json(wbk.Sheets[wbk.SheetNames[0]],{header:1}));
    }catch(e){ toast('Fichier illisible — utilisez un .xlsx ou un .csv'); } };
    r.readAsArrayBuffer(f);
  }
}
function mapperColonnes(rows){
  if(!rows.length){ toast('Fichier vide'); return; }
  const nbCol = Math.max(...rows.slice(0,10).map(r=>r.length));
  const h = (rows[0]||[]).map(x=>String(x||'').trim());
  const lettres = i => String.fromCharCode(65+i);
  // détection automatique proposée par défaut
  const auto = re => h.findIndex(x=>re.test(x.toLowerCase()));
  const dNom = auto(/nom|entreprise|soci|client|raison/), dMail = auto(/mail|courriel/),
        dCont = auto(/contact|interlocuteur|prenom|prénom/), dTel = auto(/t[eé]l|phone|portable/);
  const enTetes = dNom>-1 || dMail>-1;
  const optCols = (sel) => `<option value="-1">— ignorer —</option>` +
    Array.from({length:nbCol},(_,i)=>`<option value="${i}" ${i===sel?'selected':''}>Colonne ${lettres(i)}${h[i]?` — « ${esc(h[i].slice(0,25))} »`:''}</option>`).join('');
  const apercu = rows.slice(enTetes?1:0, (enTetes?1:0)+3);
  formModal('Importer des clients — associez les colonnes', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Fichier lu : <b>${rows.length - (enTetes?1:0)} ligne(s)</b>. Indiquez quelle colonne correspond à quoi (seul le nom est obligatoire).</p>
    <div class="fgrid">
      <div class="f"><label>Nom / entreprise *</label><select id="map_nom">${optCols(dNom>-1?dNom:0)}</select></div>
      <div class="f"><label>Email</label><select id="map_mail">${optCols(dMail)}</select></div>
      <div class="f"><label>Contact</label><select id="map_cont">${optCols(dCont)}</select></div>
      <div class="f"><label>Téléphone</label><select id="map_tel">${optCols(dTel)}</select></div>
      <div class="f full" style="flex-direction:row;align-items:center;gap:8px">
        <input type="checkbox" id="map_ent" ${enTetes?'checked':''} style="width:auto"> <label for="map_ent" style="text-transform:none;font-weight:500;font-size:.85rem">La 1ère ligne du fichier contient les titres de colonnes (ne pas l'importer)</label></div>
    </div>
    <div style="margin-top:12px;overflow-x:auto"><table style="font-size:.8rem">
      <tr>${Array.from({length:Math.min(nbCol,6)},(_,i)=>`<th>Col. ${lettres(i)}</th>`).join('')}</tr>
      ${apercu.map(r=>`<tr>${Array.from({length:Math.min(nbCol,6)},(_,i)=>`<td>${esc(String(r[i]||'').slice(0,22))}</td>`).join('')}</tr>`).join('')}
    </table><p style="font-size:.75rem;color:var(--gris);margin-top:4px">Aperçu des premières lignes${nbCol>6?' (6 premières colonnes affichées)':''}.</p></div>`,
    ()=>{
      const g = id => +document.getElementById(id).value;
      const iNom=g('map_nom'), iMail=g('map_mail'), iCont=g('map_cont'), iTel=g('map_tel');
      if(iNom<0){ toast('Choisissez la colonne du nom'); return false; }
      const start = document.getElementById('map_ent').checked ? 1 : 0;
      let ajout=0, doublons=0, vides=0;
      for(let i=start;i<rows.length;i++){
        const val = j => j>-1 ? String(rows[i][j]||'').trim() : '';
        const nom = val(iNom);
        if(!nom){ vides++; continue; }
        if(S.clients.some(c=>c.nom.toLowerCase()===nom.toLowerCase())){ doublons++; continue; }
        S.clients.push({id:S.nextClientId++, nom, contact:val(iCont), email:val(iMail), tel:val(iTel), notes:''});
        ajout++;
      }
      sauver(`Import terminé : ${ajout} client(s) ajouté(s)${doublons?`, ${doublons} doublon(s) ignoré(s)`:''}${vides?`, ${vides} ligne(s) sans nom`:''}`);
    }, 'Importer');
}

async function hashPin(p){
  const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode('piloz:'+p));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ---------- Historique versionné ---------- */
function prendreSnapshot(force){
  try{
    if(!S) return;
    S.snapshots = S.snapshots || [];
    const auj = iso(AUJ());
    if(!force && S.snapshots.some(s=>s.d===auj)) return; // un par jour maxi en auto
    const coeur = {...S}; delete coeur.snapshots;
    S.snapshots.push({d:auj, h:new Date().toTimeString().slice(0,5), data:JSON.stringify(coeur)});
    while(S.snapshots.length > 14) S.snapshots.shift();
    if(force){ sauver('Instantané enregistré'); render(); }
  }catch(e){}
}

    Par sécurité, un instantané de l'état ACTUEL sera pris juste avant, pour pouvoir revenir en arrière.</p>`,
    ()=>{

}
/* ---------- Notifications de relance ---------- */
function notifierRelances(){
  try{
    if(!S || !S.notif || typeof Notification==='undefined' || Notification.permission!=='granted') return;
    if(lsGet('piloz_notif_jour')===iso(AUJ())) return; // une seule fois par jour et par poste
    const n = aFaire().length;
    if(!n) return;
    lsSet('piloz_notif_jour', iso(AUJ()));
    const img = document.querySelector && document.querySelector('.brand img');
    new Notification('Piloz — Suivi commercial', {
      body: '🔥 ' + n + ' relance' + (n>1?'s':'') + ' à faire aujourd\u2019hui',
      icon: img ? img.src : undefined
    });
  }catch(e){}
}
async function activerNotifs(){
  try{
    if(typeof Notification==='undefined'){ toast('Notifications non supportées par ce navigateur'); return; }
    const p = await Notification.requestPermission();
    if(p==='granted'){ S.notif = true; sauver('Notifications activées'); lsSet('piloz_notif_jour', null); notifierRelances(); render(); }
    else toast('Permission refusée — autorisez les notifications pour ce site dans le navigateur');
  }catch(e){ toast('Activation impossible'); }
}
function desactiverNotifs(){ S.notif = false; sauver('Notifications désactivées'); render(); }

async function essaiPin(inp, force){
  if(inp.value.length<4) return;
  const h=await hashPin(inp.value);
  const ref=(S&&S.pinHash)||lsGet('piloz_pin');
  if(h===ref){ verrou=false; derniereActivite=Date.now(); const el=document.getElementById('lock'); if(el)el.remove(); return; }
  // pendant la frappe on ne dit rien : le code n'est peut-être pas fini d'être tapé
  if(force || inp.value.length>=8){
    const e=document.getElementById('pin_err'); if(e)e.textContent='Code incorrect';
    inp.value=''; inp.focus();
  }
}
function definirPin(){
  formModal(pinActif()?'Modifier le code PIN':'Définir un code PIN', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Le code sera demandé à chaque ouverture et après 5 minutes d'inactivité. Il est valable sur tous vos appareils connectés au même compte.</p>
    <div class="f full"><label>Nouveau code (4 à 8 chiffres)</label><input id="pin_new" type="password" inputmode="numeric" maxlength="8"></div>`,
    async ()=>{
      const p=document.getElementById('pin_new').value;
      if(!/^\d{4,8}$/.test(p)){ toast('4 à 8 chiffres uniquement'); return false; }
      const h=await hashPin(p);
      S.pinHash=h; lsSet('piloz_pin',h); sauver('Code PIN activé');
    });
}
function retirerPin(){
  formModal('Désactiver le code PIN', `<p>L'application s'ouvrira sans code.</p>`,
    ()=>{ S.pinHash=''; lsSet('piloz_pin',null); localStorage.removeItem('piloz_pin'); sauver('Code PIN désactivé'); }, 'Désactiver');
}
function demarrerVerrou(){
  if(pinActif()) ecranVerrou();
  ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{ if(!verrou) derniereActivite=Date.now(); },true));
  setInterval(()=>{ if(pinActif() && !verrou && Date.now()-derniereActivite > 5*60*1000) ecranVerrou(); }, 10000);
}

const normNom = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\b(sarl|sas|sasu|eurl|sci|sa|scop|ei)\b/g,'').replace(/[^a-z0-9]/g,' ').trim();
function copierLienConfig(){
  const b64 = btoa(JSON.stringify({url:CFG.url, key:CFG.key})).replace(/\+/g,'-').replace(/\//g,'_');
  const lien = location.origin + location.pathname + '#cfg=' + b64;
  const fin = ok => toast(ok ? 'Lien copié — collez-le sur votre autre appareil' : 'Copie impossible — sélectionnez et copiez : ' + lien);
  if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(lien).then(()=>fin(true),()=>fin(false));
  else fin(false);
}

function ouvrirPalette(){
  let el = document.getElementById('palette');
  if(!el){ el = document.createElement('div'); el.id='palette'; document.body.appendChild(el); }
  el.style.display = 'flex';
  el.innerHTML = `<div class="palcard">
    <input id="pal_in" placeholder="Rechercher un client, un dossier, une note…" oninput="chercherPalette(this.value)" onkeydown="clavierPalette(event)">
    <div class="palres" id="pal_res"></div>
    <div class="palfoot">↵ ouvrir le 1er résultat · Échap fermer</div>
  </div>`;
  el.onclick = e => { if(e.target===el) fermerPalette(); };
  setTimeout(()=>{ const i=document.getElementById('pal_in'); if(i) i.focus(); }, 30);
  chercherPalette('');
}
function fermerPalette(){ const el=document.getElementById('palette'); if(el) el.style.display='none'; }
function chercherPalette(q){
  const box = document.getElementById('pal_res');
  if(!box) return;
  q = (q||'').trim().toLowerCase();
  const res = [];
  S.clients.forEach(c=>{
    if(!q || [c.nom,c.contact,c.email,c.tel].join(' ').toLowerCase().includes(q))
      res.push({typ:'Client', coul:'var(--flamme)', fond:'var(--bleu-p)', titre:c.nom, sous:[c.contact,c.email].filter(Boolean).join(' · '), kind:'client', id:c.id});
  });
  S.deals.forEach(d=>{
    if(!q || [d.client,d.produit,d.commentaires,d.statut].join(' ').toLowerCase().includes(q))
      res.push({typ:d.statut, coul:d.statut==='Signé'?'var(--sapin)':d.statut==='Perdu'?'var(--brique)':'var(--encre)', fond:'var(--carte2)', titre:d.client+' — '+(d.produit||'dossier'), sous:eur(d.mensuel)+'/mois'+(d.unique?' + '+eur(d.unique):''), kind:'deal', id:d.id});
  });
  if(q) S.deals.forEach(d=>(d.journal||[]).forEach(e=>{
    if(e.t.toLowerCase().includes(q))
      res.push({typ:'Journal', coul:'var(--gris)', fond:'var(--carte2)', titre:e.t.slice(0,60), sous:d.client+' · '+fmtD(e.d), kind:'deal', id:d.id});
  }));
  const top = res.slice(0, 12);
  box.innerHTML = top.length
    ? top.map((r,i)=>`<button class="${i===0?'hl':''}" onclick="paletteActiver(${i})"><span class="typ" style="color:${r.coul};background:${r.fond}">${esc(r.typ)}</span><span style="flex:1"><b>${esc(r.titre)}</b><small>${esc(r.sous||'')}</small></span></button>`).join('')
    : '<button disabled style="color:var(--gris)">Aucun résultat pour « '+esc(q)+' »</button>';
  window._palResultats = top;
}
function paletteActiver(index){
  const item=(window._palResultats||[])[index];
  if(!item)return;
  fermerPalette();
  if(item.kind==='client')ficheClient(item.id);
  else if(item.kind==='deal')ficheDossier(item.id);
}
function clavierPalette(e){
  if(e.key==='Escape') fermerPalette();
  if(e.key==='Enter' && window._palResultats?.length){ paletteActiver(0); }
}
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); if(!verrou && S) ouvrirPalette(); }
  if(e.key==='Escape') fermerPalette();
});
function ecranConfig(){
  formModal('Connexion au serveur Supabase', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Copiez ces deux valeurs depuis votre projet Supabase (Settings → API). Le guide d'installation fourni avec l'application explique tout pas à pas.</p>
    <div class="f full"><label>URL du projet (Settings → API → « Project URL »)</label><input id="cfg_url" placeholder="https://xxxx.supabase.co" value="${CFG?esc(CFG.url):''}"></div>
    <p style="font-size:.78rem;color:var(--gris);margin-top:4px">⚠️ Pas le lien de votre navigateur (supabase.com/dashboard/…) — si vous le collez quand même, il sera corrigé automatiquement.</p>
    <div class="f full" style="margin-top:10px"><label>Clé « anon public »</label><input id="cfg_key" placeholder="eyJhbGci…" value="${CFG?esc(CFG.key):''}"></div>`,
    ()=>{
      const url=normaliserUrlSb(document.getElementById('cfg_url').value), key=document.getElementById('cfg_key').value.trim();
      if(!/^https:\/\/[a-z0-9-]+\.supabase\.co$/i.test(url)){ toast('URL invalide — elle doit ressembler à https://xxxx.supabase.co (Settings → API → Project URL)'); return false; }
      if(!key.startsWith('eyJ')){ toast('Clé invalide — copiez la clé « anon public » (elle commence par eyJ)'); return false; }
      CFG={url,key}; lsSet('piloz_cfg',CFG); toast('Serveur enregistré');
      setTimeout(ecranAuth, 350);
    }, 'Enregistrer');
}

function authOptions(options, value, placeholder='Sélectionnez une option'){
  return `<option value="">${placeholder}</option>` + options.map(([id,label])=>`<option value="${id}" ${value===id?'selected':''}>${esc(label)}</option>`).join('');
}
function authLabel(options, value){
  const found = options.find(([id])=>id===value);
  return found ? found[1] : (value || '—');
}
function authSummaryItem(label, value){
  return `<div class="auth-summary-item"><span>${esc(label)}</span><b>${esc(value || '—')}</b></div>`;
}
function authResetFeedback(){ authFieldErrors = {}; authStatusMessage = ''; authStatusKind = 'error'; authFocusTarget = ''; }
function authFieldError(name){ return authFieldErrors[name] || ''; }
function authErrorMarkup(name){ const err = authFieldError(name); return `<p class="auth-field-error" id="err_${name}" ${err?'':'hidden'}>${esc(err)}</p>`; }
function authAria(name){ const err = authFieldError(name); return `${err?' aria-invalid="true"':''} aria-describedby="auth_status${err?' err_'+name:''}"`; }
function authClearField(name){ if(authFieldErrors[name]) delete authFieldErrors[name]; }
function updateLoginField(name, value){ loginDraft[name] = value; authClearField(name==='email' ? 'loginEmail' : 'loginPassword'); }
function updateSignupField(name, value){ signupDraft[name] = value; persistSignupDraft(); authClearField(name); }
function updateSignupCheck(name, value){ signupDraft[name] = !!value; persistSignupDraft(); authClearField(name); }
function updateRecoveryField(name, value){ recoveryDraft[name] = value; authClearField(name==='password' ? 'resetPassword' : 'resetConfirm'); }
function switchAuthMode(event, mode){
  if(event) event.preventDefault();
  if(mode==='signup' && !signupDraft.email && loginDraft.email) signupDraft.email = loginDraft.email.trim();
  persistSignupDraft();
  authResetFeedback();
  setAuthMode(mode, {updateUrl:true, preserveStep:true});
  pageAuth();
  return false;
}
function authServerReady(){
  if(CFG && CFG.url && CFG.key) return true;
  authStatusMessage = 'La connexion Supabase n’est pas configurée sur cette instance.';
  authStatusKind = 'error';
  pageAuth();
  return false;
}
function authValidateEmail(value){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((value||'').trim()); }
function authValidateSignupStep(step){
  const errors = {};
  if(step===1){
    if(!signupDraft.firstName.trim()) errors.firstName = 'Indiquez votre prénom.';
    if(!signupDraft.lastName.trim()) errors.lastName = 'Indiquez votre nom.';
    if(!authValidateEmail(signupDraft.email)) errors.email = 'Saisissez une adresse email professionnelle valide.';
    if((signupDraft.password||'').length < 6) errors.password = 'Choisissez au moins 6 caractères.';
    if(signupDraft.confirmPassword !== signupDraft.password) errors.confirmPassword = 'Les mots de passe ne correspondent pas.';
    if(!signupDraft.terms) errors.terms = 'Vous devez accepter les conditions pour continuer.';
  }
  if(step===2){
    if(!signupDraft.companyName.trim()) errors.companyName = 'Indiquez le nom de votre entreprise.';
    if(!signupDraft.sector.trim()) errors.sector = 'Précisez votre activité.';
    if(!signupDraft.status) errors.status = 'Sélectionnez le statut de votre activité.';
    if(!signupDraft.teamSize) errors.teamSize = 'Choisissez la taille de votre entreprise.';
    const siret = (signupDraft.siret||'').replace(/\s+/g,'');
    if(siret && !/^\d{14}$/.test(siret)) errors.siret = 'Le SIRET doit contenir 14 chiffres.';
  }
  if(step===3){
    if(!signupDraft.primaryNeed) errors.primaryNeed = 'Choisissez votre besoin principal.';
    if(!signupDraft.currentTool) errors.currentTool = 'Indiquez votre outil actuel.';
    if(!signupDraft.contactsVolume) errors.contactsVolume = 'Précisez votre volume de prospects ou clients.';
  }
  return errors;
}

function pageAuth(){
  const requestedMode=new URLSearchParams(location.search).get('mode'),forced=requestedMode==='login'||requestedMode==='signup';
  if(SES && !authRecovery && !forced){ fermerAuth(); return; }
  if(!authRecovery) authMode = requestedMode==='signup' ? 'signup' : 'login';
  clearPrivateShell();
  let el = document.getElementById('auth');
  if(!el){ el = document.createElement('div'); el.id='auth'; document.body.appendChild(el); }
  setAuthVisibility(true);
  el.style.display = 'flex';
  el.innerHTML = `<div class="auth-shell">${authAside()}<section class="auth-panel">${authPanelContent()}</section></div>`;
  const target = authFocusTarget || (authRecovery ? 'reset_password' : (authMode==='signup' ? (['signup_firstName','signup_companyName','signup_primaryNeed','signup_firstName'][authStep-1] || 'signup_firstName') : 'login_email'));
  authFocusTarget = '';
  setTimeout(()=>{ const node = document.getElementById(target); if(node) node.focus(); }, 40);
}
function fermerAuth(){ const el=document.getElementById('auth'); if(el) el.remove(); setAuthVisibility(false); }
function authBack(){ authResetFeedback(); authStep = Math.max(1, authStep-1); pageAuth(); return false; }
function authSubmit(event){
  if(event) event.preventDefault();
  if(authBusy) return false;
  if(authRecovery) return authResetPassword();
  if(authMode==='login') return authLogin();
  if(authStep < AUTH_SIGNUP_STEPS){
    const errors = authValidateSignupStep(authStep);
    if(Object.keys(errors).length){ authSetErrors(errors); pageAuth(); return false; }
    authResetFeedback();
    authStep += 1;
    pageAuth();
    return false;
  }
  return authSignupFinish();
}
function authBuildOnboarding(){
  return {
    createdAt: new Date().toISOString(),
    fullName: `${signupDraft.firstName} ${signupDraft.lastName}`.trim(),
    account: {firstName: signupDraft.firstName.trim(), lastName: signupDraft.lastName.trim(), email: signupDraft.email.trim()},
    company: {name: signupDraft.companyName.trim(), sector: signupDraft.sector.trim(), status: signupDraft.status, teamSize: signupDraft.teamSize, siret: (signupDraft.siret||'').replace(/\s+/g,'')},
    needs: {primaryNeed: signupDraft.primaryNeed, currentTool: signupDraft.currentTool, contactsVolume: signupDraft.contactsVolume, heardAbout: signupDraft.heardAbout.trim()},

    acceptedTermsAt: new Date().toISOString()
  };
}
async function authSyncSession(opts={}){
  const remember = opts.remember !== false;
  const onboarding = opts.onboarding || null;
  if(remember) lsSet('piloz_ses', SES); else lsSet('piloz_ses', null);
  try{
    const d = await cloudCharger();
    S = d || structuredClone(DEFAUT);
    normaliserEtat();
    if(onboarding) S.onboarding = onboarding;
    if(!d || onboarding) await cloudSauver();
    setSync('ok');
  }catch(e){
    setSync('offline');
    if(!S) S = structuredClone(DEFAUT);
    normaliserEtat();
    if(onboarding) S.onboarding = onboarding;
  }
  if(S && S.pinHash) lsSet('piloz_pin', S.pinHash);
  if(S && S.theme) appliquerTheme(S.theme);
  derniereActivite = Date.now();
  authStatusMessage = '';
  authFieldErrors = {};
  authBusy = false;
  authRecovery = false;
  applyAuthModeToUrl('');
  await chargerLicence();
  fermerAuth();
  render();
  notifierRelances();
  controlerLicence();
  return true;
}
function authErrorMessage(error, fallback='Une erreur est survenue. Réessayez dans quelques instants.'){
  const raw = String(error?.message || error || '').trim();
  const message = raw.toLocaleLowerCase('en');
  if(message.includes('email rate limit') || message.includes('rate limit exceeded')) return 'Trop d’e-mails ont été demandés. Patientez quelques minutes avant de réessayer.';
  if(message.includes('invalid login credentials') || message.includes('invalid credentials')) return 'Adresse e-mail ou mot de passe incorrect.';
  if(message.includes('email not confirmed')) return 'Confirmez votre adresse e-mail avant de vous connecter.';
  if(message.includes('user already registered') || message.includes('already been registered')) return 'Un compte existe déjà avec cette adresse e-mail.';
  if(message.includes('password') && (message.includes('weak') || message.includes('characters'))) return 'Le mot de passe ne respecte pas les critères de sécurité.';
  if(message.includes('network') || message.includes('failed to fetch') || message.includes('serveur injoignable')) return 'Serveur injoignable — vérifiez votre connexion internet.';
  return fallback;
}
async function authLogin(){
  if(!authServerReady()) return false;
  const errors = {};
  if(!authValidateEmail(loginDraft.email)) errors.loginEmail = 'Saisissez une adresse email valide.';
  if((loginDraft.password||'').length < 6) errors.loginPassword = 'Le mot de passe doit contenir au moins 6 caractères.';
  if(Object.keys(errors).length){ authSetErrors(errors); pageAuth(); return false; }
  authBusy = true;
  authStatusMessage = 'Connexion en cours…';
  authStatusKind = 'info';
  pageAuth();
  try{
    const r = await fetch(CFG.url.replace(/\/$/,'') + '/auth/v1/token?grant_type=password', {method:'POST', headers:{'apikey':CFG.key,'Content-Type':'application/json'}, body:JSON.stringify({email:loginDraft.email.trim(), password:loginDraft.password})});
    const j = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(j.msg || j.error_description || j.message || 'Identifiants refusés.');
    SES = {access_token:j.access_token, refresh_token:j.refresh_token, user_id:j.user.id, email:j.user.email};
    await authSyncSession({remember:loginDraft.remember});
    loginDraft.password = '';
    toast('Connecté ☁️');
  }catch(e){
    authBusy = false;
    authStatusMessage = authErrorMessage(e, 'Connexion impossible. Vérifiez vos informations puis réessayez.');
    authStatusKind = 'error';
    pageAuth();
  }
  return false;
}
async function authSignupFinish(){
  if(!authServerReady()) return false;
  const errors = authValidateSignupStep(1);
  Object.assign(errors, authValidateSignupStep(2), authValidateSignupStep(3));
  if(Object.keys(errors).length){ authSetErrors(errors); authStep = Object.keys(authValidateSignupStep(1)).length ? 1 : (Object.keys(authValidateSignupStep(2)).length ? 2 : 3); pageAuth(); return false; }
  const onboarding = authBuildOnboarding();
  authBusy = true;
  authStatusMessage = 'Création du compte…';
  authStatusKind = 'info';
  pageAuth();
  try{
    const r = await fetch(CFG.url.replace(/\/$/,'') + '/auth/v1/signup', {method:'POST', headers:{'apikey':CFG.key,'Content-Type':'application/json'}, body:JSON.stringify({email: signupDraft.email.trim(), password: signupDraft.password, data: {first_name: signupDraft.firstName.trim(), last_name: signupDraft.lastName.trim(), full_name: onboarding.fullName, company_name: signupDraft.companyName.trim(), onboarding}})});
    const j = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(j.msg || j.error_description || j.message || 'Création refusée.');
    loginDraft.email = signupDraft.email.trim();
    loginDraft.password = '';
    if(!j.access_token){
      clearSignupDraft();
      authBusy = false;
      authStatusMessage = 'Compte créé — confirmez votre email puis connectez-vous.';
      authStatusKind = 'success';
      authFieldErrors = {};
      setAuthMode('login', {updateUrl:true});
      pageAuth();
      return false;
    }
    SES = {access_token:j.access_token, refresh_token:j.refresh_token, user_id:(j.user&&j.user.id)||'', email:(j.user&&j.user.email)||signupDraft.email.trim()};
    clearSignupDraft();
    await authSyncSession({remember:true, onboarding});
    toast('Bienvenue dans Piloz ✨');
  }catch(e){
    authBusy = false;
    authStatusMessage = authErrorMessage(e, 'Création du compte impossible. Réessayez dans quelques instants.');
    authStatusKind = 'error';
    pageAuth();
  }
  return false;
}
async function authForgotPassword(event){
  if(event) event.preventDefault();
  if(!authServerReady()) return false;
  if(!authValidateEmail(loginDraft.email)){
    authSetErrors({loginEmail:'Renseignez une adresse email valide pour recevoir le lien de réinitialisation.'});
    pageAuth();
    return false;
  }
  authBusy = true;
  authStatusMessage = 'Envoi du lien de réinitialisation…';
  authStatusKind = 'info';
  pageAuth();
  try{
    const redirectTo = location.origin + location.pathname + '?mode=login';
    const r = await fetch(CFG.url.replace(/\/$/,'') + '/auth/v1/recover', {method:'POST', headers:{'apikey':CFG.key,'Content-Type':'application/json'}, body:JSON.stringify({email:loginDraft.email.trim(), redirect_to: redirectTo})});
    const j = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(j.msg || j.error_description || j.message || 'Envoi impossible.');
    authBusy = false;
    authFieldErrors = {};
    authStatusMessage = 'Un email de réinitialisation vient d’être envoyé.';
    authStatusKind = 'success';
    pageAuth();
  }catch(e){
    authBusy = false;
    authStatusMessage = authErrorMessage(e, 'Envoi du lien impossible. Réessayez dans quelques instants.');
    authStatusKind = 'error';
    pageAuth();
  }
  return false;
}
async function authResetPassword(){
  if(!authServerReady()) return false;
  const errors = {};
  if((recoveryDraft.password||'').length < 6) errors.resetPassword = 'Choisissez au moins 6 caractères.';
  if(recoveryDraft.confirmPassword !== recoveryDraft.password) errors.resetConfirm = 'Les mots de passe ne correspondent pas.';
  if(Object.keys(errors).length){ authSetErrors(errors); pageAuth(); return false; }
  authBusy = true;
  authStatusMessage = 'Mise à jour du mot de passe…';
  authStatusKind = 'info';
  pageAuth();
  try{
    const r = await fetch(CFG.url.replace(/\/$/,'') + '/auth/v1/user', {method:'PUT', headers:{'apikey':CFG.key,'Content-Type':'application/json','Authorization':'Bearer '+SES.access_token}, body:JSON.stringify({password: recoveryDraft.password})});
    const j = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(j.msg || j.error_description || j.message || 'Mise à jour refusée.');
    recoveryDraft = {password:'', confirmPassword:''};
    await authSyncSession({remember:true});
    toast('Mot de passe mis à jour');
  }catch(e){
    authBusy = false;
    authStatusMessage = authErrorMessage(e, 'Mise à jour du mot de passe impossible. Réessayez dans quelques instants.');
    authStatusKind = 'error';
    pageAuth();
  }
  return false;
}
/* ---------- Licence / abonnement ---------- */
async function apiLic(methode, chemin, corps){
  const r = await fetch(CFG.url.replace(/\/$/,'') + '/rest/v1/' + chemin, {
    method: methode,
    headers: {'apikey':CFG.key, 'Authorization':'Bearer '+SES.access_token, 'Content-Type':'application/json', 'Prefer': methode==='POST'?'return=representation':'return=minimal'},
    body: corps ? JSON.stringify(corps) : undefined
  });
  if(r.status===404) throw new Error('NOTABLE');
  if(!r.ok) throw new Error('licence http '+r.status);
  if(methode==='GET' || methode==='POST'){ try{ return await r.json(); }catch(e){ return null; } }
  return null;
}
async function chargerLicence(){
  try{
    const rows = await apiLic('GET', 'licences?select=*&user_id=eq.'+SES.user_id);
    if(rows && rows.length){ LIC = rows[0]; return; }
    const fin = plusJours(iso(AUJ()), ESSAI_JOURS);
    const ins = await apiLic('POST', 'licences', {user_id:SES.user_id, email:SES.email, plan:'essai', fin, actif:true});
    LIC = (ins && ins[0]) || {plan:'essai', fin, actif:true};
    toast('🎁 Votre essai gratuit de '+ESSAI_JOURS+' jours démarre !');
  }catch(e){
    LIC = e.message==='NOTABLE' ? {plan:'installation', fin:'2099-01-01', actif:true} : null;
  }
}
function licenceValide(){
  if(!SES) return true;
  if(!LIC) return true;
  return LIC.actif !== false && (LIC.fin||'2099') >= iso(AUJ());
}
function joursLicence(){ return LIC && LIC.fin ? Math.ceil((new Date(LIC.fin+'T00:00') - AUJ())/86400000) : null; }
function controlerLicence(){
  if(licenceValide()){
    const j = joursLicence();
    if(LIC && LIC.plan==='essai' && j!==null && j<=5) toast('⏳ Essai gratuit : '+j+' jour(s) restant(s)');
    return;
  }
  ecranLicence();
}
function ecranLicence(){
  let el = document.getElementById('licence');
  if(!el){ el = document.createElement('div'); el.id='licence'; el.style.cssText='position:fixed;inset:0;z-index:175;background:linear-gradient(160deg,var(--encre-2),var(--encre));display:flex;align-items:center;justify-content:center;padding:18px'; document.body.appendChild(el); }
  el.innerHTML = `<div class="authcard" style="text-align:center">
    <div class="plogo" style="margin:0 auto 10px">P</div>
    <h2 style="color:var(--encre);letter-spacing:0;font-size:1.2rem;margin-bottom:8px">Votre ${LIC&&LIC.plan==='essai'?'essai gratuit est terminé':'abonnement a expiré'}</h2>
    <p style="font-size:.9rem;color:var(--gris);margin-bottom:14px">Vos données sont conservées en sécurité. Pour continuer à utiliser Piloz, activez votre abonnement.</p>
    <a class="btn btn-p" style="justify-content:center;text-decoration:none" href="mailto:${esc(ADMIN_EMAIL)}?subject=${encodeURIComponent('Abonnement Piloz')}">✉ Activer mon abonnement</a>
    <p style="font-size:.78rem;color:var(--gris);margin-top:14px"><a href="#" style="color:var(--gris)" onclick="deconnecter();document.getElementById('licence').remove();return false">Se déconnecter</a></p>
  </div>`;
}

/* ---------- Backoffice ---------- */
function estAdmin(){ return SES && SES.email && SES.email.toLowerCase()===ADMIN_EMAIL.toLowerCase(); }
function vBackoffice(){
  charts.forEach(c=>c.destroy()); charts=[];
  document.getElementById('main').innerHTML = `
  <div class="topbar"><h1>👑 Backoffice</h1><div class="actions"><button class="btn btn-o" onclick="render()">⟳ Actualiser</button></div></div>
  <div class="card"><h2>LICENCES & ABONNÉS</h2><div id="bo_liste"><p style="color:var(--gris)">⏳ Chargement…</p></div></div>`;
  boCharger();
}
async function boCharger(){
  try{
    const rows = await apiLic('GET', 'licences?select=*&order=fin.asc');
    const box = document.getElementById('bo_liste');
    if(!box) return;
    if(!rows.length){ box.innerHTML = '<p style="color:var(--gris)">Aucun compte pour l\u2019instant.</p>'; return; }
    const auj = iso(AUJ());
    box.innerHTML = `<div style="overflow-x:auto"><table><tr><th>Email</th><th>Plan</th><th>Fin</th><th>État</th><th style="text-align:right">Actions</th></tr>
    ${rows.map(l=>{
      const ok = l.actif!==false && (l.fin||'2099')>=auj;
      return `<tr><td>${esc(l.email||l.user_id)}</td><td>${esc(l.plan||'—')}</td><td class="mono">${fmtD(l.fin)}</td>
      <td><span class="st ${ok?'st-sig':'st-per'}">${ok?'Actif':'Expiré'}</span></td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-o" style="padding:5px 10px;font-size:.76rem" onclick="boProlonger('${l.user_id}','${l.fin||auj}',30,'mensuel')">+30 j</button>
        <button class="btn btn-o" style="padding:5px 10px;font-size:.76rem" onclick="boProlonger('${l.user_id}','${l.fin||auj}',365,'annuel')">+1 an</button>
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:.76rem" onclick="boActif('${l.user_id}',${l.actif===false})">${l.actif===false?'Réactiver':'Suspendre'}</button>
      </td></tr>`;}).join('')}</table></div>
      <p style="font-size:.78rem;color:var(--gris);margin-top:10px">${rows.length} compte(s).</p>`;
  }catch(e){
    const box = document.getElementById('bo_liste');
    if(box) box.innerHTML = '<p style="color:var(--brique)">'+(e.message==='NOTABLE'?'La table « licences » n\u2019existe pas — exécutez setup-piloz.sql dans Supabase.':'Erreur : '+esc(e.message))+'</p>';
  }
}
async function boProlonger(uid, fin, jours, plan){
  const base = fin >= iso(AUJ()) ? fin : iso(AUJ());
  await apiLic('PATCH', 'licences?user_id=eq.'+uid, {fin: plusJours(base, jours), plan, actif:true});
  toast('Licence prolongée'); render();
}
async function boActif(uid, actif){
  await apiLic('PATCH', 'licences?user_id=eq.'+uid, {actif});
  toast(actif?'Compte réactivé':'Compte suspendu'); render();
}
/* ---------- Administration : création de comptes depuis les Paramètres ---------- */
function adminCreerCompte(){
  formModal('👑 Créer un compte (administrateur)', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Le nouveau compte pourra se connecter à l'application, mais ne verra <b>que ses propres données</b> — jamais les vôtres (isolation garantie par la base).</p>
    <div class="f full"><label>Email du nouveau compte</label><input id="adm_mail" type="email"></div>
    <div class="f full" style="margin-top:10px"><label>Mot de passe provisoire (6 caractères min.)</label><input id="adm_mdp" type="text"></div>
    <p id="adm_err" style="color:var(--brique);font-size:.85rem;min-height:1.2em;margin-top:8px"></p>`,
    async ()=>{
      const email=document.getElementById('adm_mail').value.trim(), mdp=document.getElementById('adm_mdp').value;
      const errEl=document.getElementById('adm_err');
      if(!email||mdp.length<6){ if(errEl)errEl.textContent='Email et mot de passe (6 caractères min.) requis.'; return false; }
      try{
        const r = await fetch(CFG.url.replace(/\/$/,'') + '/auth/v1/signup',
          {method:'POST', headers:{'apikey':CFG.key,'Content-Type':'application/json'}, body:JSON.stringify({email,password:mdp})});
        const j = await r.json();
        if(!r.ok){ if(errEl)errEl.textContent = j.msg || j.error_description || j.message || 'Création refusée (vérifiez que les inscriptions sont autorisées dans Supabase).'; return false; }
        toast('Compte « '+email+' » créé — communiquez-lui le mot de passe');
      }catch(e){ if(errEl)errEl.textContent='Serveur injoignable.'; return false; }
    }, 'Créer le compte');
}
