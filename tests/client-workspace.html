<body><main id="main"></main><div id="result" data-status="running">RUNNING</div>
<script>
window.__errors=[];addEventListener('error',event=>__errors.push(event.message));window.toast=()=>{};window.confirm=()=>true;
const company='22222222-2222-4222-8222-222222222222',client='33333333-3333-4333-8333-333333333333',contact='44444444-4444-4444-8444-444444444444',billing='55555555-5555-4555-8555-555555555555',service='66666666-6666-4666-8666-666666666666';
window.PilozRuntime={session:{user_id:'11111111-1111-4111-8111-111111111111',email:'test@piloz.fr'}};
const clientRow={id:client,company_id:company,kind:'company',legal_name:'Atelier Dupont',trade_name:'Dupont Pro',email:'contact@dupont.fr',phone_e164:'+33102030405',siret:'12345678900012',city:'Lyon',customer_status:'active',created_at:'2026-07-01T10:00:00Z'};
const contactRow={id:contact,company_id:company,client_id:client,first_name:'Marie',last_name:'Dupont',job_title:'DAF',email:'marie@dupont.fr',is_primary:true,active:true};

const serviceRow={id:service,company_id:company,client_id:client,label:'Chantier',address_type:'service',address_line_1:'20 avenue Piloz',postal_code:'75001',city:'Paris',country_code:'FR',is_default_shipping:true,is_default_service:true,active:true};
const preferences={client_id:client,default_contact_id:contact,billing_address_id:billing,shipping_address_id:service,service_address_id:service,payment_terms:'45 jours',payment_delay_days:45,payment_method:'bank_transfer',currency:'EUR',usual_discount_rate:3,language:'fr'};
const documentRow={id:'77777777-7777-4777-8777-777777777777',company_id:company,client_id:client,document_type:'invoice',number:'FAC-2026-0012',status:'finalized',issue_date:'2026-07-20',due_date:'2026-08-20',total_incl_tax:1200,finalized_at:'2026-07-20T12:00:00Z',updated_at:'2026-07-20T12:00:00Z'};
const state={companyId:company,draft:null,data:{clients:[clientRow],clientContacts:[contactRow],clientPreferences:[preferences],documents:[documentRow],payments:[{id:'p1',company_id:company,document_id:documentRow.id,amount:400,status:'confirmed',paid_at:'2026-07-21T09:00:00Z'}],members:[{user_id:PilozRuntime.session.user_id,role:'owner'}],templates:[]}};
const calls=[];
window.PilozERP={
 rpc:async(name,args)=>{calls.push(['rpc',name,args]);if(name==='get_client_directory'||name==='get_client_directory_v2')return{items:[{...clientRow,contact_first_name:'Marie',contact_last_name:'Dupont',contact_email:'marie@dupont.fr',auxiliary_account:'CLI000042',total_invoiced:1200,total_paid:400,outstanding:800,overdue_count:0,last_document_at:documentRow.updated_at}],total:1};if(name==='get_client_workspace_summary')return{client:clientRow,preferences,accounting:{auxiliary_account:'CLI000042'},primary_contact:contactRow,primary_address:billingRow,metrics:{quoted:1500,accepted:1200,invoiced:1200,paid:400,overdue:0,open_activities:1},last_activity_at:'2026-07-22T10:00:00Z'};if(name==='save_document_client_context')return{id:args.target_document_id};return{id:'saved'};},
 query:async(table)=>{calls.push(['query',table]);return({client_contacts:[contactRow],client_contact_roles:[{contact_id:contact,role:'primary'},{contact_id:contact,role:'billing'}],client_addresses:[billingRow,serviceRow],client_preferences:[preferences],documents:[documentRow],client_activity_events:[{id:'e1',summary:'Facture finalisée',occurred_at:'2026-07-20T12:00:00Z',metadata:{number:documentRow.number}}],client_notes:[{id:'n1',client_id:client,body:'Client prioritaire',pinned:true,updated_at:'2026-07-22T10:00:00Z'}],payments:state.data.payments,payment_schedules:[{id:'s1',document_id:documentRow.id,due_date:'2026-08-20',amount:1200,status:'pending'}],activities:[{id:'a1',client_id:client,activity_type:'call',subject:'Relance',status:'todo',due_at:'2026-07-24T10:00:00Z'}],client_accounting_profiles:[{client_id:client,auxiliary_account:'CLI000042',collective_account:'411000'}],client_account_history:[{client_id:client,new_auxiliary_account:'CLI000042',assignment_mode:'automatic',effective_from:'2026-07-01',created_at:'2026-07-01T10:00:00Z'}],company_customer_account_settings:[{company_id:company,default_collective_account:'411000',prefix:'CLI',padding:6,next_number:43,account_format:'prefix_number',automatic_generation:true,allow_manual:true,enforce_uniqueness:true}],client_documents:[{id:'f1',client_id:client,file_name:'contrat.pdf',document_type:'contract',storage_path:company+'/clients/'+client+'/contrat.pdf',created_at:'2026-07-20T10:00:00Z'}]}[table]||[]);},
 update:async()=>[],insert:async()=>[{id:'created'}],remove:async()=>{},upload:async()=>{},signedUrl:async()=>({signedURL:'data:application/pdf;base64,JVBERi0xLjc='})
};
window.PilozApp={getState:()=>state,go(path){location.hash=path;calls.push(['go',path]);},refresh:async()=>{},newClientDocument(id,type){calls.push(['newClientDocument',id,type]);},editDocument(id){calls.push(['editDocument',id]);},saveDocument:async()=>state.draft?.id||documentRow.id};
window.PilozCommercialV2={esc:value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char])),notify:()=>{}};
location.hash='sales/clients';
</script>
<script src="../assets/js/modules/erp/erp-clients.js"></script>
<script>
(async()=>{const checks=[],check=(label,value)=>checks.push([label,!!value]),wait=ms=>new Promise(resolve=>setTimeout(resolve,ms));
 try{
  PilozClients.renderRoute('sales/clients',state);await wait(40);
  check('liste financière réelle',main.textContent.includes('Atelier Dupont')&&main.textContent.includes('1 200,00')&&main.textContent.includes('800,00'));
  check('recherche et filtres',!!main.querySelector('.client-search input')&&main.textContent.includes('Tous les statuts')&&main.textContent.includes('Colonnes'));
  check('sélection et export disponibles',!!main.querySelector('[aria-label^="Sélectionner"]')&&main.textContent.includes('Exporter CSV'));
  location.hash=`sales/clients/${client}?tab=summary`;PilozClients.renderRoute(location.hash.slice(1),state);await wait(60);
  check('route dédiée et synthèse',main.textContent.includes('Fiche client')&&main.textContent.includes('Total facturé')&&main.textContent.includes('Client prioritaire'));
  check('treize rubriques client',main.querySelectorAll('.client-tabs button').length===13);
  for(const tab of ['coordinates','contacts','addresses','quotes','invoices','payments','schedules','activities','accounting','documents','notes','history']){location.hash=`sales/clients/${client}?tab=${tab}`;PilozClients.renderRoute(location.hash.slice(1),state);await wait(35);check(`rubrique ${tab}`,!!main.querySelector('.client-tab-content')&&!/undefined|null/.test(main.textContent));}
  check('contacts et rôles',main.textContent.includes('Historique complet'));
  location.hash=`sales/clients/${client}?tab=contacts`;PilozClients.renderRoute(location.hash.slice(1),state);await wait(35);check('fiche contact multiple',main.textContent.includes('Marie Dupont')&&main.textContent.includes('Contact facturation'));
  location.hash=`sales/clients/${client}?tab=addresses`;PilozClients.renderRoute(location.hash.slice(1),state);await wait(35);check('adresses spécialisées',main.textContent.includes('Facturation')&&main.textContent.includes('Chantier'));
  const draft={id:'88888888-8888-4888-8888-888888888888',document_type:'invoice',client_id:client};state.draft=draft;await PilozClients.applyClientDefaults(draft,client,state);
  check('préférences appliquées au document',draft.contact_id===contact&&draft.billing_address_id===billing&&draft.delivery_address_id===service&&draft.payment_terms==='45 jours');
  main.innerHTML='<div class="document-v2"><aside class="document-v2-panel"><section></section></aside></div>';location.hash='document-editor';PilozClients.enhanceDocumentContext();await wait(20);
  check('sélecteurs document injectés',main.querySelectorAll('[data-client-document-context] select').length===3&&main.textContent.includes('Contact destinataire'));
  await PilozApp.saveDocument(true);check('contexte document persisté',calls.some(call=>call[0]==='rpc'&&call[1]==='save_document_client_context'&&call[2].target_contact_id===contact));
  location.hash='settings/accounting';PilozClients.renderRoute('settings/accounting',state);main.innerHTML='<div class="modern-settings-grid"><section class="phase1-card">Fiscalité</section></div>';await PilozClients.enhanceAccountSettings();
  check('paramètres comptes clients',main.textContent.includes('Comptes clients')&&main.querySelector('[name="prefix"]')?.value==='CLI'&&main.textContent.includes('Vérifier l’unicité')&&main.querySelector('[data-client-save]')?.type==='submit');
  check('aucune erreur JavaScript',!__errors.length);
 }catch(error){checks.push(['exécution',false,error.stack||error.message]);}
 const failed=checks.filter(row=>!row[1]),result=document.getElementById('result');result.dataset.status=failed.length?'failed':'passed';result.textContent=failed.length?`Échec ${failed.length}/${checks.length} : ${failed.map(row=>row[0]+(row[2]?' ('+row[2]+')':'')).join(', ')}`:`${checks.length}/${checks.length} contrôles espace Clients réussis`;
})();
</script></body></html>
