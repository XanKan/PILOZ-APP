<script src="../assets/js/modules/erp/erp-commercial-workspace.js"></script>
<script>
(async()=>{const checks=[],check=(name,value)=>checks.push([name,!!value]);try{
 PilozCommercialWorkspace.renderDueDates(state);
 check('deux actions par échéance',main.textContent.includes('Renvoyer par e-mail')&&main.textContent.includes('Saisir un règlement')&&!main.textContent.includes('Activité'));

 PilozCommercialWorkspace.openDueEmail('invoice-1');
 const emailForm=document.getElementById('due-email-form');
 check('popup e-mail centrée et préremplie',!!emailForm&&emailForm.elements.to.value==='factures@alpha.fr'&&emailForm.elements.subject.value.includes('FAC-2026-001'));
 PilozCommercialWorkspace.addDueEmailContact('contact-primary');check('autre contact actif ajouté',emailForm.elements.to.value.includes('alice@alpha.fr'));
 check('PDF final et solutions manuelles visibles',emailForm.textContent.includes('PDF définitif')&&emailForm.textContent.includes('Copier le message')&&emailForm.textContent.includes('Ouvrir la messagerie')&&emailForm.textContent.includes('Noter un envoi manuel'));
 await PilozCommercialWorkspace.sendDueEmail({preventDefault(){}},'invoice-1');
 const emailCall=calls.find(call=>call[0]==='invoke'&&call[1]==='send-document-email');
 check('envoi utilise la fonction sécurisée avec destinataires multiples',emailCall?.[2].to.length===2&&Array.isArray(emailCall[2].cc)&&emailCall[2].templateKey==='invoice_resend_default');
 PilozCommercialWorkspace.closeDueAction();
 const automaticInvoke=PilozERP.invoke;PilozERP.invoke=async()=>{throw Object.assign(new Error('L’envoi automatique n’est pas configuré. Vous pouvez télécharger le PDF, copier le message ou ouvrir votre messagerie.'),{code:'email_provider_not_configured'});};
 PilozCommercialWorkspace.openDueEmail('invoice-1');await PilozCommercialWorkspace.sendDueEmail({preventDefault(){}},'invoice-1');
 check('aucun faux succès sans fournisseur e-mail',!!document.getElementById('due-email-form')&&document.getElementById('due-action-message')?.classList.contains('error')&&document.getElementById('due-action-message')?.textContent.includes('pas configuré'));
 PilozERP.invoke=automaticInvoke;PilozCommercialWorkspace.closeDueAction();

 check('popup règlement dédiée',!!paymentForm&&paymentForm.textContent.includes('Factures à affecter')&&paymentForm.textContent.includes('Compte de réception'));
 check('seuls modes actifs disponibles',paymentForm.elements.payment_method.querySelectorAll('option').length===3&&!paymentForm.textContent.includes('Espèces'));
