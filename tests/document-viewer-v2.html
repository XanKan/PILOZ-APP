window.PilozERP={rpc:async(name,args)=>{calls.push(['rpc',name,args]);if(name==='save_document_comment')return'dc-new';if(name.startsWith('record_document_payment'))return'p-new';if(name==='convert_quote_to_invoice'||name.startsWith('create_'))return'f1';return{};},invoke:async(name,args)=>{calls.push(['invoke',name,args]);return{ready:false,status:'pending'};},update:async(table,id,data)=>{calls.push(['update',table,id,data]);return[{id,...data}]},signedUrl:async()=>({})};

<script src="../assets/js/modules/erp/erp-document-viewer-v2.js"></script>
<script>
(async()=>{
 const checks=[],check=(label,value)=>checks.push([label,!!value]),wait=ms=>new Promise(resolve=>setTimeout(resolve,ms));
 try{
  check('API publique exposée',typeof PilozDocumentViewerV2.open==='function'&&typeof PilozDocumentViewerV2.saveComment==='function');
  location.hash='document-viewer?id=q1&type=quote';PilozModern.renderRoute('document-viewer',state);
  check('structure en trois colonnes',!!document.querySelector('.document-viewer-list')&&!!document.querySelector('.document-viewer-preview')&&!!document.querySelector('.document-viewer-side'));
  check('liste compacte devis',document.querySelectorAll('.document-viewer-list-item').length===2&&main.textContent.includes('En attente')&&main.textContent.includes('Acceptés')&&main.textContent.includes('Refusés'));
  check('recherche et filtre statut',!!document.querySelector('[data-document-viewer-search]')&&!!document.querySelector('.document-viewer-search-row select'));
  check('aperçu figé du snapshot',main.textContent.includes('Aperçu figé')&&main.textContent.includes('DEV-2026-0042'));
  await wait(20);check('génération PDF reprise depuis le snapshot',calls.some(call=>call[0]==='invoke'&&call[1]==='generate-document-pdf'&&call[2].documentId==='q1'));
  await wait(3200);check('réponse PDF 202 retentée automatiquement',calls.filter(call=>call[0]==='invoke'&&call[1]==='generate-document-pdf'&&call[2].documentId==='q1').length>=2);
  check('coût interne absent du document client',!document.querySelector('.document-snapshot-paper').textContent.includes('45'));
  check('toolbar PDF complète',main.textContent.includes('85 %')&&document.querySelectorAll('.document-viewer-toolbar button').length>=7);
  check('panneau devis complet',main.textContent.includes('Reste à facturer')&&main.textContent.includes('Convertir en…')&&main.textContent.includes('Modifier via une nouvelle version'));
  check('documents liés visibles',main.textContent.includes('FAC-2026-0081'));
  check('commentaire interne visible',main.textContent.includes('Note commerciale interne')&&main.textContent.includes('Jamais inclus dans le PDF'));
  PilozDocumentViewerV2.changeZoom(10);check('zoom pilotable',main.textContent.includes('95 %'));
  PilozDocumentViewerV2.search('Bêta');check('filtrage compact fonctionnel',document.querySelectorAll('.document-viewer-list-item').length===1&&document.querySelector('.document-viewer-list-item').textContent.includes('600,00'));
  PilozDocumentViewerV2.search('');PilozDocumentViewerV2.select('f1');
  check('navigation sans fermer la vue',location.hash.includes('id=f1')&&!!document.querySelector('.document-viewer-v2'));
  check('onglets factures',main.textContent.includes('À traiter')&&main.textContent.includes('À venir')&&main.textContent.includes('En retard')&&main.textContent.includes('Encaissées'));
  check('paiement réel et solde',main.textContent.includes('400,00')&&main.textContent.includes('800,00')&&main.textContent.includes('Enregistrer le paiement total'));
  PilozDocumentViewerV2.openPayment('partial');const paymentForm=document.getElementById('document-viewer-payment-form');paymentForm.amount.value='200';paymentForm.paid_at.value='2026-07-21';paymentForm.payment_method.value='bank_transfer';paymentForm.reference.value='VIR-002';await PilozDocumentViewerV2.savePayment();
  check('RPC paiement atomique avec commentaire',calls.some(call=>call[0]==='rpc'&&call[1]==='record_document_payment_v2'&&call[2].target_document_id==='f1'&&call[2].payment_amount===200));
  PilozDocumentViewerV2.select('f1');PilozDocumentViewerV2.openPaymentCancellation('p1');document.querySelector('#document-viewer-payment-cancellation-form textarea').value='Doublon bancaire';await PilozDocumentViewerV2.cancelPayment();check('annulation paiement traçable',calls.some(call=>call[0]==='rpc'&&call[1]==='cancel_document_payment'&&call[2].cancellation_reason==='Doublon bancaire'));
  PilozDocumentViewerV2.select('q1');document.querySelector('#document-viewer-comment-form textarea').value='Nouveau commentaire';await PilozDocumentViewerV2.saveComment();
  check('création commentaire par RPC',calls.some(call=>call[0]==='rpc'&&call[1]==='save_document_comment'&&call[2].target_document_id==='q1'));
  PilozDocumentViewerV2.editComment('dc1');document.querySelector('#document-viewer-comment-form textarea').value='Commentaire modifié';await PilozDocumentViewerV2.saveComment();
  check('édition commentaire par RPC',calls.some(call=>call[0]==='rpc'&&call[1]==='update_document_comment'&&call[2].target_comment_id==='dc1'));
  await PilozDocumentViewerV2.deleteComment('dc1');check('suppression logique par RPC',calls.some(call=>call[0]==='rpc'&&call[1]==='delete_document_comment'));
  await PilozDocumentViewerV2.convert('deposit_invoice');check('formulaire acompte pourcentage ou montant',!!document.getElementById('document-viewer-conversion-form')&&main.textContent.includes('Pourcentage du devis'));await PilozDocumentViewerV2.saveConversion();check('RPC acompte spécialisée',calls.some(call=>call[0]==='rpc'&&call[1]==='create_deposit_invoice'&&call[2].deposit_percent===30));
  PilozDocumentViewerV2.select('q1');await PilozDocumentViewerV2.convert('progress_invoice');check('progression par ligne proposée',main.textContent.includes('Avancement cumulé')||main.textContent.includes('avancement cumulé'));const progress=document.querySelector('[name^="progress_"]');if(progress)progress.value='40';await PilozDocumentViewerV2.saveConversion();check('RPC situation spécialisée',calls.some(call=>call[0]==='rpc'&&call[1]==='create_progress_invoice'&&call[2].line_progress?.[0]?.progress_percent===40));
  PilozDocumentViewerV2.select('q1');await PilozDocumentViewerV2.convert('balance_invoice');await PilozDocumentViewerV2.saveConversion();check('RPC solde spécialisée',calls.some(call=>call[0]==='rpc'&&call[1]==='create_balance_invoice'&&call[2].target_quote_id==='q1'));
  PilozDocumentViewerV2.select('f1');PilozDocumentViewerV2.openCredit();document.querySelector('#document-viewer-credit-form textarea').value='Erreur de facturation';await PilozDocumentViewerV2.saveCredit();check('RPC avoir avec motif',calls.some(call=>call[0]==='rpc'&&call[1]==='create_credit_note'&&call[2].credit_reason==='Erreur de facturation'));
  PilozDocumentViewerV2.select('q1');
  PilozDocumentViewerV2.toggleList();check('liste repliable tablette',document.querySelector('.document-viewer-v2').classList.contains('list-collapsed'));
  PilozDocumentViewerV2.toggleInfo();check('panneau droit repliable',!document.querySelector('.document-viewer-v2').classList.contains('info-open'));
  history.replaceState(null,'','#autre-route');check('route historique toujours chaînée',PilozModern.renderRoute('autre-route',state)===false&&calls.some(call=>call[0]==='legacyRoute'&&call[1]==='autre-route'));
  check('aucune erreur JavaScript',!__errors.length);
  await wait(20);
 }catch(error){checks.push(['exécution',false,error.stack||error.message]);}
 const failed=checks.filter(row=>!row[1]),result=document.getElementById('result');result.dataset.status=failed.length?'failed':'passed';result.textContent=failed.length?`Échec ${failed.length}/${checks.length} : ${failed.map(row=>row[0]+(row[2]?' ('+row[2]+')':'')).join(', ')}`:`${checks.length}/${checks.length} contrôles consultation documents réussis`;
